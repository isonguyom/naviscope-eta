name: Dashboard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
name: Dashboard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # IMPORTANT: install inside dashboard folder
      - name: Install dependencies
        run: npm install
        working-directory: apps/dashboard

      - name: Run ESLint
        run: npm run lint
        working-directory: apps/dashboard

      - name: Build Next.js app
        run: npm run build
        working-directory: apps/dashboard
